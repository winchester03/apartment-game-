<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
  >

  <title>Apartment Game</title>

  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: black;
    }

    #gameCanvas {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
    }

    #message {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 16px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.65);
      color: white;
      font-family: Arial, sans-serif;
      z-index: 2;
    }
  </style>
</head>

<body>
  <div id="message">Drag the screen to look around.</div>
  <canvas id="gameCanvas"></canvas>

  <script src="https://cdn.babylonjs.com/babylon.js"></script>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const engine = new BABYLON.Engine(canvas, true);

    function createScene() {
      const scene = new BABYLON.Scene(engine);

      scene.clearColor = new BABYLON.Color4(0.06, 0.07, 0.09, 1);

      const camera = new BABYLON.ArcRotateCamera(
        "camera",
        Math.PI / 2,
        Math.PI / 3,
        9,
        new BABYLON.Vector3(0, 1, 0),
        scene
      );

      camera.attachControl(canvas, true);
      camera.lowerRadiusLimit = 4;
      camera.upperRadiusLimit = 12;

      const light = new BABYLON.HemisphericLight(
        "light",
        new BABYLON.Vector3(0, 1, 0),
        scene
      );

      light.intensity = 0.9;

      const floor = BABYLON.MeshBuilder.CreateGround(
        "floor",
        {
          width: 10,
          height: 10
        },
        scene
      );

      const floorMaterial = new BABYLON.StandardMaterial(
        "floorMaterial",
        scene
      );

      floorMaterial.diffuseColor = new BABYLON.Color3(
        0.22,
        0.17,
        0.14
      );

      floor.material = floorMaterial;

      const cube = BABYLON.MeshBuilder.CreateBox(
        "testCube",
        {
          width: 2,
          height: 2,
          depth: 2
        },
        scene
      );

      cube.position.y = 1;

      const cubeMaterial = new BABYLON.StandardMaterial(
        "cubeMaterial",
        scene
      );

      cubeMaterial.diffuseColor = new BABYLON.Color3(
        0.25,
        0.55,
        0.85
      );

      cube.material = cubeMaterial;

      return scene;
    }

    const scene = createScene();

    engine.runRenderLoop(() => {
      scene.render();
    });

    window.addEventListener("resize", () => {
      engine.resize();
    });
  </script>
</body>
</html>
